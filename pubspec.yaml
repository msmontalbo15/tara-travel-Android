name: tara_travel
description: Tara Travel - Your journey, your way
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🎬 Animations
  lottie: ^3.3.3

  # 📱 Icons
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  supabase_flutter: ^2.12.2
  google_maps_flutter: ^2.17.0
  permission_handler: ^11.3.1
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.1
  location: ^8.0.1
  dio: ^5.9.2
  font_awesome_flutter: ^11.0.0
  image_picker: ^1.2.1
  share_plus: ^13.0.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.0
  google_sign_in: ^6.2.1
  path_provider: ^2.1.5
  path: ^1.9.0
  sembast: ^3.8.6
  uuid: ^4.5.1

  # 🔐 Security
  flutter_secure_storage: ^10.3.1   # AES-256 via Android Keystore (EncryptedSharedPreferences)
  crypto: ^3.0.6                    # SHA-256 for password strength scoring

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # 🌅 Native splash generator
  flutter_native_splash: ^2.4.0

  # 📱 App icon generator
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true

  # 📁 ASSETS
  assets:
    - .env
    - assets/logo.png
    - assets/icon.png
    - assets/adaptive-icon.png
    - assets/animations/

  # 🔤 FONTS (VERY IMPORTANT — FIXES YOUR ERRORS)
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
        - asset: assets/fonts/DMSans-SemiBold.ttf
        - asset: assets/fonts/DMSans-Bold.ttf

    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf

# 🌅 NATIVE SPLASH CONFIG (NO WHITE FLASH)
flutter_native_splash:
  color: "#F6F4F2"
  image: assets/logo.png
  android: true
  ios: true

  android_12:
    image: assets/logo.png
    icon_background_color: "#F6F4F2"

# 📱 APP ICON CONFIG
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F6F4F2"
  adaptive_icon_foreground: "assets/logo.png"
