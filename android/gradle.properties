org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
kotlin.incremental=false

# R8 full mode: enables additional shrinking optimisations (class merging, inlining).
# Combined with isMinifyEnabled=true in build.gradle.kts for release builds.
android.enableR8.fullMode=true

# Jetifier: rewrites legacy support-library references to AndroidX equivalents.
android.enableJetifier=true
